<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Интерактивная фотогалерея</title>
    <style>
        body { text-align: center; font-family: Arial; }
        .gallery { display: flex; justify-content: center; flex-wrap: wrap; margin-top: 20px; }
        .gallery img { width: 200px; height: 150px; margin: 10px; border: 2px solid #ccc; transition: transform 0.3s, opacity 0.3s, border-color 0.3s; cursor: pointer; }
        .hovered { transform: scale(1.1); opacity: 0.7; border-color: #ff6600; }
    </style>
</head>
<body>
    <h1>Интерактивная фотогалерея</h1>
    <div class="gallery">
        <img src="image1.jpg" alt="Фото 1" onmouseover="hoverEffect(this)" onmouseout="leaveEffect(this)">
        <img src="image2.jpg" alt="Фото 2" onmouseover="hoverEffect(this)" onmouseout="leaveEffect(this)">
        <img src="image3.jpg" alt="Фото 3" onmouseover="hoverEffect(this)" onmouseout="leaveEffect(this)">
    </div>
    <script src="script.js"></script>
</body>
</html>
